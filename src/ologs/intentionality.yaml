# Visual Kei Intentionality & Design Principles
# Layer 2: Mapping rules and synthesis guidance

intentionality:
  core_philosophy:
    description: "Visual Kei is a legitimate Japanese artistic movement combining music with theatrical visual presentation"
    
    key_principles:
      - "Androgyny and gender-bending are central artistic expressions, not incidental"
      - "Each subgenre has specific cultural and musical roots"
      - "Visual presentation is integral to the music, not separate from it"
      - "Authenticity requires understanding the cultural context"
    
    cultural_sensitivity:
      - "Avoid stereotyping or caricature"
      - "Use authentic terminology"
      - "Respect the artistic tradition"
      - "Acknowledge Japanese cultural origins"

  synthesis_guidance:
    general_approach: >
      When synthesizing Visual Kei aesthetic parameters into an image generation prompt,
      weave the visual vocabulary naturally into the original concept without losing
      the user's intent. Use authentic Japanese Visual Kei terminology where appropriate.
    
    priority_elements:
      - "subgenre mood and atmosphere"
      - "hair structure and volume"
      - "makeup intensity and style"
      - "color palette adherence"
      - "era-appropriate production value"
    
    avoid:
      - "stereotyping or caricature"
      - "anachronistic elements (mixing eras inappropriately)"
      - "culturally insensitive framing"
      - "conflicting substyle elements without intentional fusion"
    
    fusion_rules:
      allowed: "Intentional fusion between compatible subgenres when explicitly requested"
      guidance: "When fusing, use one subgenre's structure with another's color palette"
      caution: "Kote Kei and Oshare Kei have opposing moods - fusion requires careful balance"

# Intensity level mappings
intensity_levels:
  low:
    percentage_range: "30-40%"
    description: "Minimal visual kei influence, everyday wearable"
    
    modifiers:
      hair: 0.5
      makeup: 0.4
      garment: 0.5
    
    use_cases:
      - "everyday wear"
      - "fan fashion"
      - "subtle influence"
      - "casual events"
    
    prompt_guidance: "Subtle VK influence, recognizable to fans but wearable in public"

  medium:
    percentage_range: "50-70%"
    description: "Clear substyle identity, recognizable VK"
    
    modifiers:
      hair: 0.75
      makeup: 0.7
      garment: 0.75
    
    use_cases:
      - "concerts (audience)"
      - "meet-and-greets"
      - "themed events"
      - "fan gatherings"
    
    prompt_guidance: "Clearly Visual Kei, substyle identifiable, enthusiast level"

  high:
    percentage_range: "80-90%"
    description: "Professional appearance, full styling"
    
    modifiers:
      hair: 0.9
      makeup: 0.9
      garment: 0.9
    
    use_cases:
      - "band performances"
      - "professional shoots"
      - "music videos"
      - "promotional events"
    
    prompt_guidance: "Professional Visual Kei styling, band-member quality"

  maximum:
    percentage_range: "95-100%"
    description: "Theatrical, iconic, maximum impact"
    
    modifiers:
      hair: 1.0
      makeup: 1.0
      garment: 1.0
    
    use_cases:
      - "album covers"
      - "major performances"
      - "promotional campaigns"
      - "iconic imagery"
    
    prompt_guidance: "Maximum theatrical impact, iconic representation"

# Parameter calculation rules
calculation_rules:
  intensity_percentage:
    formula: "base_intensity × archetype_modifier × context_modifier"
    constraints:
      minimum: 30
      maximum: 100
    
    base_values:
      low: 35
      medium: 60
      high: 85
      maximum: 97

  hair_volume:
    era_modifiers:
      pioneer_1980s: 1.3
      golden_age_1990s: 1.0
      diversification_2000s: 0.85
      neo_revival_2010s: 0.7
    
    intensity_scaling: "volume_inches × intensity_modifier"

  makeup_application:
    subgenre_base:
      kote_kei: "heavy"
      oshare_kei: "medium"
      nagoya_kei: "minimal"
      angura_kei: "theatrical"
      eroguro_kei: "theatrical"
      lolita_kei: "refined"
      iryou_kei: "theatrical"
    
    intensity_scaling: "base_intensity scaled by modifier"

# Prompt construction formula
prompt_formula:
  structure: "[SUBGENRE] + [ERA] + [INTENSITY] + [CONTEXT] + [ARCHETYPE] + [SPECIFIC ELEMENTS]"
  
  template: >
    {subgenre_name} Visual Kei aesthetic from the {era_name}, 
    {intensity_percentage}% styling intensity for {context_name}.
    {archetype_description if archetype else ''}
    Hair: {hair_description}. 
    Makeup: {makeup_description}. 
    Garments: {garment_description}.
    Color palette: {color_palette}.
    Mood: {mood}.

# Composition with other MCPs
composition_guidance:
  high_compatibility:
    magazine_photography:
      pattern: "context + subject"
      description: "Magazine MCP provides editorial setting, VK provides character styling"
    
    game_show_aesthetics:
      pattern: "cultural coherence"
      description: "Japanese variety show context pairs naturally with Japanese VK"
    
    baseball_card:
      pattern: "format + content"
      description: "Card format from Baseball, styling from VK for band member cards"
  
  moderate_compatibility:
    cocktail_aesthetics:
      pattern: "synesthetic translation"
      description: "Cocktail mood/color influences VK color palette selection"
    
    perfume_aesthetics:
      pattern: "synesthetic translation"
      description: "Perfume mood influences VK atmosphere and lighting"
  
  experimental:
    nuclear_phases:
      pattern: "post-apocalyptic"
      description: "Damaged, destroyed aesthetic combined with VK styling"
