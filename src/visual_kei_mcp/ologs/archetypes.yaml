# Visual Kei Band Member Archetype Taxonomy
# Layer 1: Pure deterministic lookup data

archetypes:
  vocalist:
    name: "Vocalist/Frontman"
    description: "Lead singer and primary visual focus of the band"
    
    visual_priority: "highest"
    intensity_modifier: 1.1
    
    characteristics:
      hair: "Most elaborate, tallest, most dramatic"
      makeup: "Most refined, signature look"
      clothing: "Most ornate, central visual"
      presence: "Leader, face of band"
    
    prompt_additions:
      - "frontman"
      - "most elaborate styling"
      - "central focus"
      - "iconic appearance"
    
    functional_considerations:
      - "Microphone-compatible styling"
      - "Face clearly visible"
      - "Maximum stage presence"
    
    typical_styling:
      hair_volume_modifier: 1.2
      makeup_intensity_modifier: 1.1
      accessory_count: "maximum"

  guitarist:
    name: "Guitarist"
    description: "Lead or rhythm guitarist - cool, skilled aesthetic"
    
    visual_priority: "high"
    intensity_modifier: 1.0
    
    characteristics:
      hair: "Dramatic but functional for playing"
      makeup: "Heavy but allows stage movement"
      clothing: "Stylish but allows guitar playing"
      presence: "Cool, mysterious, skilled"
    
    prompt_additions:
      - "guitarist"
      - "functional dramatic styling"
      - "cool mysterious aesthetic"
    
    functional_considerations:
      - "Arms free for playing"
      - "Hair won't interfere with fretboard"
      - "Can look down at guitar"
    
    typical_styling:
      hair_volume_modifier: 1.0
      makeup_intensity_modifier: 1.0
      accessory_count: "moderate"

  bassist:
    name: "Bassist"
    description: "Bass player - often darkest, most brooding aesthetic"
    
    visual_priority: "dark_emphasis"
    intensity_modifier: 0.95
    
    characteristics:
      hair: "Often darkest, heaviest styling"
      makeup: "Intense, often most gothic"
      clothing: "Darker palette emphasis"
      presence: "Brooding, foundation, intense"
    
    prompt_additions:
      - "bassist"
      - "darkest aesthetic"
      - "brooding mysterious"
      - "intense styling"
    
    functional_considerations:
      - "Similar to guitarist"
      - "Often more stationary"
      - "Can have heavier accessories"
    
    typical_styling:
      hair_volume_modifier: 0.9
      makeup_intensity_modifier: 1.1
      accessory_count: "heavy"
      color_preference: "darkest"

  drummer:
    name: "Drummer"
    description: "Drummer - functional styling with secured elements"
    
    visual_priority: "functional"
    intensity_modifier: 0.9
    
    characteristics:
      hair: "Secured, won't interfere with drumming"
      makeup: "Long-lasting, sweat-resistant"
      clothing: "Moveable, less elaborate top"
      presence: "Energetic, powerful, foundation"
    
    prompt_additions:
      - "drummer"
      - "secured functional styling"
      - "powerful energetic presence"
    
    functional_considerations:
      - "Hair must be secured"
      - "Sweat-resistant makeup"
      - "Upper body movement freedom"
      - "Often seated visibility"
    
    typical_styling:
      hair_volume_modifier: 0.7
      makeup_intensity_modifier: 0.9
      accessory_count: "minimal_upper"
      secured_hair: true

  keyboardist:
    name: "Keyboardist"
    description: "Keyboard/synth player - elegant, sophisticated aesthetic"
    
    visual_priority: "elegant"
    intensity_modifier: 0.95
    
    characteristics:
      hair: "Elegant, refined"
      makeup: "Sophisticated"
      clothing: "Often more elegant, formal"
      presence: "Sophisticated, atmospheric"
    
    prompt_additions:
      - "keyboardist"
      - "elegant styling"
      - "sophisticated atmospheric presence"
    
    functional_considerations:
      - "Hands free for playing"
      - "Often more stationary"
      - "Can have elaborate sleeves"
    
    typical_styling:
      hair_volume_modifier: 0.85
      makeup_intensity_modifier: 0.95
      accessory_count: "elegant"
      style_preference: "refined"

# Keyword mappings for intent detection
keywords:
  vocalist: ["vocalist", "singer", "frontman", "lead singer", "vocal", "vo"]
  guitarist: ["guitarist", "guitar", "lead guitar", "rhythm guitar", "gt"]
  bassist: ["bassist", "bass", "bass player", "ba"]
  drummer: ["drummer", "drums", "percussion", "dr"]
  keyboardist: ["keyboardist", "keyboard", "keys", "piano", "synth", "key"]

# Default band configurations
band_configurations:
  duo:
    members: ["vocalist", "guitarist"]
    description: "Minimal two-piece"
  
  trio:
    members: ["vocalist", "guitarist", "bassist"]
    description: "Classic power trio"
  
  quartet:
    members: ["vocalist", "guitarist", "bassist", "drummer"]
    description: "Standard four-piece"
  
  quintet:
    members: ["vocalist", "guitarist", "guitarist", "bassist", "drummer"]
    description: "Classic five-piece with dual guitars"
  
  sextet:
    members: ["vocalist", "guitarist", "guitarist", "bassist", "drummer", "keyboardist"]
    description: "Full six-piece with keyboards"
