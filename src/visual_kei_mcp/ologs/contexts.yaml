# Visual Kei Context Taxonomy
# Layer 1: Pure deterministic lookup data

contexts:
  stage_performance:
    name: "Stage Performance"
    description: "Live concert or performance setting"
    
    intensity_modifier: 1.1
    
    requirements:
      - "secured hair"
      - "durable makeup"
      - "high visibility"
    
    lighting: "dramatic stage lighting"
    
    considerations:
      - "movement-friendly"
      - "visible from distance"
      - "sweat-resistant"
    
    prompt_additions:
      - "stage performance lighting"
      - "dramatic impact"
      - "secured styling"
      - "concert atmosphere"
    
    technical_notes:
      visibility: "optimized for distance"
      durability: "high"
      movement: "unrestricted"

  photoshoot:
    name: "Professional Photoshoot"
    description: "Studio or professional photography session"
    
    intensity_modifier: 1.0
    
    requirements:
      - "HD-ready"
      - "every detail perfected"
      - "artistic direction"
    
    lighting: "studio quality, professional"
    
    considerations:
      - "no visible flaws"
      - "maximum detail"
      - "polished"
    
    prompt_additions:
      - "professional photography"
      - "studio lighting"
      - "high detail"
      - "polished"
    
    technical_notes:
      visibility: "close-up ready"
      durability: "session length"
      movement: "posed"

  street_fashion:
    name: "Street Fashion"
    description: "Everyday wearable visual kei street style"
    
    intensity_modifier: 0.6
    
    requirements:
      - "wearable"
      - "practical"
      - "comfortable"
    
    lighting: "natural daylight"
    
    considerations:
      - "functional"
      - "weather-appropriate"
      - "achievable"
    
    prompt_additions:
      - "street fashion"
      - "wearable"
      - "casual visual kei"
      - "toned down aesthetic"
    
    technical_notes:
      visibility: "normal"
      durability: "all day"
      movement: "unrestricted"

  music_video:
    name: "Music Video"
    description: "Cinematic music video production"
    
    intensity_modifier: 1.0
    
    requirements:
      - "cinematic"
      - "narrative context"
      - "dynamic"
    
    lighting: "cinematic, varied"
    
    considerations:
      - "movement"
      - "multiple angles"
      - "storytelling"
    
    prompt_additions:
      - "music video still"
      - "cinematic lighting"
      - "dynamic composition"
      - "narrative moment"
    
    technical_notes:
      visibility: "camera-optimized"
      durability: "shoot length"
      movement: "choreographed"

  album_cover:
    name: "Album Cover"
    description: "Album artwork and promotional imagery"
    
    intensity_modifier: 1.05
    
    requirements:
      - "iconic"
      - "memorable"
      - "print-ready"
    
    lighting: "artistic, dramatic"
    
    considerations:
      - "high resolution"
      - "text space"
      - "iconic composition"
    
    prompt_additions:
      - "album cover art"
      - "iconic composition"
      - "print quality"
      - "memorable"
    
    technical_notes:
      visibility: "maximum impact"
      durability: "permanent record"
      movement: "static, posed"

# Keyword mappings for intent detection
keywords:
  stage_performance: ["stage", "concert", "live", "performance", "show", "tour", "gig"]
  photoshoot: ["photoshoot", "photo shoot", "studio", "professional", "editorial", "magazine"]
  street_fashion: ["street", "casual", "everyday", "wearable", "daily", "harajuku"]
  music_video: ["music video", "mv", "video", "cinematic", "pv", "promotional video"]
  album_cover: ["album", "cover", "album art", "single", "ep cover", "artwork", "jacket"]
